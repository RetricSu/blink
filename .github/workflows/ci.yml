name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  host-test:
    name: Host unit tests (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src
      - run: cargo test

  qemu-smoke:
    name: QEMU smoke test (ESP32-C3)
    runs-on: ubuntu-latest
    needs: host-test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rust-src
          targets: riscv32imc-unknown-none-elf

      - name: Install QEMU with ESP32-C3 support
        run: |
          QEMU_RELEASE_JSON=$(curl -fsSL -H "Accept: application/vnd.github+json" https://api.github.com/repos/espressif/qemu/releases/latest || true)
          QEMU_TAG=$(jq -r '.tag_name // empty' <<< "${QEMU_RELEASE_JSON}")
          QEMU_ASSET=$(jq -r '.assets[]?.name | select(test("^qemu-riscv32-softmmu-.*x86_64-linux-gnu\\.tar\\.xz$"))' <<< "${QEMU_RELEASE_JSON}" | head -1)
          if [ -z "${QEMU_TAG}" ] || [ -z "${QEMU_ASSET}" ]; then
            QEMU_TAG=$(curl -fsSL https://github.com/espressif/qemu/releases/latest | grep -oE '/espressif/qemu/releases/expanded_assets/[^"]+' | sed 's#.*/expanded_assets/##' | head -1)
            QEMU_ASSET=$(curl -fsSL "https://github.com/espressif/qemu/releases/expanded_assets/${QEMU_TAG}" | grep -oE 'qemu-riscv32-softmmu-[^" ]+x86_64-linux-gnu\.tar\.xz' | head -1)
          fi
          if [ -z "${QEMU_TAG}" ] || [ -z "${QEMU_ASSET}" ]; then
            echo "Failed to resolve QEMU release tag or Linux riscv32 asset."
            exit 1
          fi
          curl -fsSL -o "${QEMU_ASSET}" "https://github.com/espressif/qemu/releases/download/${QEMU_TAG}/${QEMU_ASSET}"
          tar xf "${QEMU_ASSET}"
          echo "$PWD/qemu/bin" >> "$GITHUB_PATH"
          qemu-system-riscv32 --version

      - name: Build and smoke test
        run: |
          ./qemu-run
